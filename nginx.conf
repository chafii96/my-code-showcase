##############################################################################
#  US Postal Tracking — Nginx VPS Config
#  uspostaltracking.com
#
#  النسخ إلى:
#    /etc/nginx/sites-available/uspostaltracking
#  التفعيل:
#    ln -sf /etc/nginx/sites-available/uspostaltracking /etc/nginx/sites-enabled/
#    nginx -t && systemctl reload nginx
##############################################################################

# ── HTTP: إعادة توجيه كل شيء إلى HTTPS ──────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name uspostaltracking.com www.uspostaltracking.com;
    return 301 https://uspostaltracking.com$request_uri;
}

# ── www → root ────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.uspostaltracking.com;

    ssl_certificate     /etc/letsencrypt/live/uspostaltracking.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/uspostaltracking.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://uspostaltracking.com$request_uri;
}

# ── Main HTTPS Server ─────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name uspostaltracking.com;

    root /var/www/uspostaltracking/dist;
    index index.html;

    # ── SSL ───────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/uspostaltracking.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/uspostaltracking.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout    5s;

    # ── Security Headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Gzip Compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/woff2;

    # ── Upload Size ───────────────────────────────────────────────────────────
    client_max_body_size 20M;

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/uspostaltracking_access.log;
    error_log  /var/log/nginx/uspostaltracking_error.log warn;

    # ── Block Bad Bots & Crawlers ─────────────────────────────────────────────
    if ($http_user_agent ~* (semalt|majestic|rogerbot|dotbot|ahrefsbot|mj12bot|blexbot|scrapy)) {
        return 403;
    }

    # ── Block sensitive files ─────────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    location ~ \.(env|git|bak|sql|sh|config)$ {
        deny all;
        return 404;
    }

    # ── Sitemap + Robots — SEO critical, no cache ─────────────────────────────
    location = /robots.txt {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        access_log off;
        try_files $uri =404;
    }
    location ~ ^/sitemap.*\.xml$ {
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
        access_log off;
        try_files $uri =404;
    }

    # ── API Proxy → server/index.js (port 8080, PM2 cluster) ─────────────────
    location /api/ {
        proxy_pass          http://127.0.0.1:8080;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade $http_upgrade;
        proxy_set_header    Connection 'upgrade';
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_cache_bypass  $http_upgrade;
        proxy_read_timeout  60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout  60s;
        proxy_buffering     off;

        # CORS preflight
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  "*";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept";
            add_header Content-Length 0;
            return 204;
        }
    }

    # ── Hashed Static Assets — immutable cache 1 year ────────────────────────
    location ~* /assets/.*\.(js|css|woff2?|ttf|eot|png|jpg|jpeg|gif|ico|svg|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000";
        access_log off;
        try_files $uri =404;
    }

    # ── Non-hashed images / fonts ─────────────────────────────────────────────
    location ~* \.(woff2?|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
        access_log off;
        try_files $uri =404;
    }

    # ── Prerendered SEO Shells: serve shell first, then SPA fallback ──────────
    # Prerender shells are built into dist/ at build time (16,000+ HTML files)
    # try_files checks: 1) exact file, 2) directory index.html, 3) SPA root
    location / {
        # 1-hour browser cache for HTML shells (they change on redeploy)
        expires 1h;
        add_header Cache-Control "public, max-age=3600, must-revalidate";

        try_files $uri $uri/index.html $uri/ /index.html;
    }

    # ── Tracking page — higher cache ─────────────────────────────────────────
    location ~* ^/track/[A-Za-z0-9]+$ {
        expires 5m;
        add_header Cache-Control "public, max-age=300";
        try_files $uri $uri/index.html /index.html;
    }

    # ── Admin panel — no cache ────────────────────────────────────────────────
    location ^~ /admin {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    # ── Legacy redirects (GSC coverage fixes) ────────────────────────────────
    location = /track-without-number          { return 301 /guides/track-without-tracking-number; }
    location = /mobile-tracking               { return 301 /guides/usps-mobile-tracking; }
    location = /tracking-number-format        { return 301 /guides/tracking-number-format; }
    location = /usps-informed-delivery-guide  { return 301 /guides/usps-informed-delivery; }
    location = /de                            { return 301 /; }
    location = /de/                           { return 301 /; }
    location ~* ^/de/(.*)$                    { return 301 /$1; }
}
