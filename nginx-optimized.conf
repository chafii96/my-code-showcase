# Optimized Nginx Configuration for uspostaltracking.com
# Fixes: Compression, Caching, HTTP/2, Performance

server {
    listen 80;
    listen [::]:80;
    server_name uspostaltracking.com www.uspostaltracking.com;
    
    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.uspostaltracking.com;
    
    # SSL Configuration (update paths to your certificates)
    ssl_certificate /etc/letsencrypt/live/uspostaltracking.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/uspostaltracking.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    
    # Redirect www to non-www
    return 301 https://uspostaltracking.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name uspostaltracking.com;
    
    root /var/www/uspostaltracking.com/dist;
    index index.html;
    
    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/uspostaltracking.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/uspostaltracking.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # ═══════════════════════════════════════════════════════
    # GZIP COMPRESSION (68% payload reduction)
    # ═══════════════════════════════════════════════════════
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/rss+xml
        application/atom+xml
        image/svg+xml
        application/x-font-ttf
        application/x-font-opentype
        application/vnd.ms-fontobject
        font/woff
        font/woff2;
    gzip_min_length 256;
    gzip_disable "msie6";
    
    # ═══════════════════════════════════════════════════════
    # BROTLI COMPRESSION (even better than gzip)
    # ═══════════════════════════════════════════════════════
    # Uncomment if you have brotli module installed
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    
    # ═══════════════════════════════════════════════════════
    # CACHING HEADERS
    # ═══════════════════════════════════════════════════════
    
    # Static assets with hash (immutable, cache forever)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif|mp4|webm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }
    
    # HTML files (short cache, must revalidate)
    location ~* \.html$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }
    
    # Sitemaps and robots.txt (1 day cache)
    location ~* \.(xml|txt)$ {
        expires 1d;
        add_header Cache-Control "public";
        access_log off;
    }
    
    # ═══════════════════════════════════════════════════════
    # SECURITY HEADERS
    # ═══════════════════════════════════════════════════════
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    
    # Content Security Policy (adjust as needed)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://www.google-analytics.com https://pagead2.googlesyndication.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://www.google-analytics.com;" always;
    
    # ═══════════════════════════════════════════════════════
    # PERFORMANCE OPTIMIZATIONS
    # ═══════════════════════════════════════════════════════
    
    # Enable TCP optimizations
    tcp_nodelay on;
    tcp_nopush on;
    
    # Increase buffer sizes
    client_body_buffer_size 128k;
    client_max_body_size 20M;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 16k;
    
    # Timeouts
    client_body_timeout 12;
    client_header_timeout 12;
    keepalive_timeout 65;
    send_timeout 10;
    
    # ═══════════════════════════════════════════════════════
    # ROUTING
    # ═══════════════════════════════════════════════════════
    
    # API proxy (if you have backend)
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
    }
    
    # Programmatic pages
    location /programmatic/ {
        try_files $uri $uri/ $uri.html =404;
    }
    
    # City pages
    location /city/ {
        try_files $uri $uri/ /index.html;
    }
    
    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # Block sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    location ~ \.(env|git|bak|sql|log|md)$ {
        deny all;
    }
    
    # Logs
    access_log /var/log/nginx/uspostaltracking_access.log;
    error_log /var/log/nginx/uspostaltracking_error.log;
}
